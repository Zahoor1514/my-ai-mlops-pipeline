name: MLOps Autonomous AI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  ai-mlops-lifecycle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Enterprise Docker Image
        run: docker build -t ghcr.io/${{ github.repository }}/ai-mlops-engine:latest .

      - name: Push Production Image to Cloud Registry
        run: docker push ghcr.io/${{ github.repository }}/ai-mlops-engine:latest
